version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lumina_postgres_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lumina_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
    # [SEGURANÇA] Porta do banco NÃO exposta ao host — acessível apenas pela rede interna
    # Remova o 'ports' abaixo para produção. Descomente apenas em dev se precisar de acesso direto.
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - lumina_network

  web:
    build: ./backend
    container_name: lumina_django_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-lumina_analytics}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres_password}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - DEBUG=${DEBUG:-0}
      - SECRET_KEY=${SECRET_KEY:-django-dev-key-change-me-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - lumina_network

volumes:
  postgres_data:

networks:
  lumina_network:
    driver: bridge
