version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lumina_postgres_prod
    environment:
      POSTGRES_DB: lumina_prod
      # Fail-fast: docker-compose aborta o boot se essas envs não estiverem definidas.
      # NÃO adicionar defaults aqui — defaults inseguros em prod são o achado crítico #1 da auditoria 2026-05-17.
      POSTGRES_USER: ${PROD_DB_USER:?PROD_DB_USER obrigatório em produção}
      POSTGRES_PASSWORD: ${PROD_DB_PASSWORD:?PROD_DB_PASSWORD obrigatório em produção}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: always # Auto-restart no caso de reboot da Droplet/EC2
    networks:
      - lumina_prod_network

  web:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: lumina_django_backend_prod
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2
    volumes:
      - static_volume:/app/staticfiles
      # IMPORTANTE: Sem mapeamento direto de código (./backend:/app) em produção! 
      # O código foi "bakado" dentro da imagem durante o build do CI/CD.
    ports:
      - "8000:8000"
    environment:
      # Fail-fast em todas as envs sensíveis (sem defaults inseguros).
      # SECRET_KEY já era exigida; ALLOWED_HOSTS e credenciais do banco agora também.
      - SECRET_KEY=${PROD_SECRET_KEY:?PROD_SECRET_KEY obrigatório em produção}
      - DEBUG=False # Crítico na AWS/Droplet
      - ALLOWED_HOSTS=${ALLOWED_PROD_HOSTS:?ALLOWED_PROD_HOSTS obrigatório (NUNCA usar * em produção)}
      - DATABASE_URL=postgres://${PROD_DB_USER}:${PROD_DB_PASSWORD}@db:5432/lumina_prod
    depends_on:
      - db
    restart: always
    networks:
      - lumina_prod_network

volumes:
  postgres_prod_data:
  static_volume:

networks:
  lumina_prod_network:
    driver: bridge
